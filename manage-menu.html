<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Menu - Liquor Shop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <h1 class="brand">Liquor Shop POS</h1>
        <nav class="nav-links">
          <a href="./index.html">POS</a>
          <a class="active" href="./manage-menu.html">Manage Menu</a>
          <a href="./reports.html">Monthly Reports</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2 class="section-title">Manage Menu Items</h2>
        <form id="menuForm" class="form-grid">
          <input type="hidden" id="itemId" />
          <label>
            Item Name
            <input id="itemName" required />
          </label>
          <label>
            Category
            <select id="itemCategory" required></select>
          </label>
          <label>
            Price (INR)
            <input id="itemPrice" type="number" min="1" step="0.01" required />
          </label>
          <label>
            Image URL
            <input id="itemImageUrl" type="url" placeholder="https://..." required />
          </label>
          <div>
            <button class="btn btn-primary" type="submit" id="saveBtn">Add Item</button>
            <button class="btn btn-secondary" type="button" id="resetBtn">Reset</button>
          </div>
        </form>
        <p id="menuStatus" class="status"></p>
      </section>

      <section class="card">
        <h3 class="section-title">Current Menu</h3>
        <div class="muted">Use Edit/Delete to manage products.</div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="menuTableBody"></tbody>
        </table>
      </section>
    </main>

    <script src="./app.js"></script>
    <script src="./menu-admin.js"></script>
  </body>
</html>
